#cloud-config
network:
  version: 2

  ethernets:
    eth0:
      match:
        macaddress: "00:11:22:33:44:55"
      set-name: eth0
      dhcp4: false

    eth1:
      dhcp4: true
      dhcp6: true

    eth2:
      match:
        macaddress: "00:aa:bb:cc:dd:ee"
      set-name: eth2
      dhcp4: false
      addresses:
        - 10.20.30.40/24
      nameservers:
        addresses:
          - 9.9.9.9
          - 8.8.8.8
        search:
          - example.org

  vlans:
    vlan100:
      id: 100
      link: eth0
      addresses:
        - 192.168.100.10/24
        - 192.168.100.11/24
      dhcp6: true
      mtu: 1500
      macaddress: "00:11:22:33:44:66"
      nameservers:
        addresses:
          - 8.8.8.8
          - 1.1.1.1
        search:
          - corp.example.com
          - vlan.test
      routes:
        - to: 10.10.200.0/24
          via: 192.168.100.1
          metric: 50
        - to: 10.10.201.0/24
          via: 192.168.100.2
          metric: 150
    vl101:
      id: 101
      link: eth2
